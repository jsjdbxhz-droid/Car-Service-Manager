kind = "web"
previewPath = "/"
title = "Garage Manager"
version = "1.0.0"
id = "artifacts/garage-app"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5173

[services.development]
run = "pnpm --filter @workspace/garage-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/garage-app", "run", "build" ]
serve = "static"
publicDir = "artifacts/garage-app/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5173"
BASE_PATH = "/"
